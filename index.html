<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile Hub</title>
  <!-- Font Awesome CDN -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text-color);
      transition: background 0.3s, color 0.3s;
    }

    /* Dark/Light theme vars */
    html[data-theme="dark"] {
      --bg: #121212;
      --text-color: #eee;
      --nav-bg: #1f1f1f;
      --link-color: #bbb;
      --link-hover: #4ea8de;
      --section-bg: #1a1a1a;
      --btn-bg: #333;
      --btn-hover: #4ea8de;
      --icon-color: #7ea9d6;
    }

    html[data-theme="light"] {
      --bg: #f5f5f5;
      --text-color: #111;
      --nav-bg: #fff;
      --link-color: #333;
      --link-hover: #0077cc;
      --section-bg: #fff;
      --btn-bg: #ddd;
      --btn-hover: #0077cc;
      --icon-color: #0077cc;
    }

    /* Top nav */
    nav {
      background-color: var(--nav-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .nav-title {
      font-weight: bold;
      font-size: 1.5rem;
      color: var(--text-color);
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      color: var(--link-color);
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      padding: 0.3rem 0.5rem;
      border-radius: 4px;
      transition: background-color 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-links a:hover,
    .nav-links a.active {
      background-color: var(--btn-bg);
      color: var(--btn-hover);
    }

    /* Hamburger */
    .hamburger {
      display: none;
      background: none;
      border: none;
      font-size: 1.8rem;
      color: var(--text-color);
      cursor: pointer;
    }

    /* Responsive menu */
    @media (max-width: 768px) {
      .nav-links {
        position: fixed;
        top: 56px;
        right: 0;
        background-color: var(--nav-bg);
        height: calc(100vh - 56px);
        width: 200px;
        flex-direction: column;
        padding: 1rem;
        gap: 1rem;
        transform: translateX(100%);
        transition: transform 0.3s ease;
        box-shadow: -2px 0 5px rgba(0,0,0,0.3);
      }
      .nav-links.open {
        transform: translateX(0);
      }
      .hamburger {
        display: block;
      }
    }

    /* Main content styling */
    main {
      max-width: 700px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    section {
      background-color: var(--section-bg);
      padding: 1.2rem 1.5rem;
      border-radius: 8px;
      margin-bottom: 1.8rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.15);
    }

    section h2 {
      margin-top: 0;
      margin-bottom: 1rem;
      font-weight: 700;
      color: var(--btn-hover);
      border-bottom: 2px solid var(--btn-hover);
      padding-bottom: 0.3rem;
    }

    ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }

    li {
      margin-bottom: 0.8rem;
    }

    a {
      color: var(--link-color);
      text-decoration: none;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    a:hover {
      color: var(--link-hover);
      text-decoration: underline;
    }

    /* Icon styling */
    .fa-icon {
      color: var(--icon-color);
      min-width: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-title">Profile Hub</div>
    <button class="hamburger" aria-label="Toggle menu" onclick="toggleMenu()">☰</button>
    <div class="nav-links" id="navLinks">
      <a href="index.html" class="active"><i class="fa-solid fa-user fa-icon"></i>Profile Hub</a>
      <a href="gallery/index.html"><i class="fa-solid fa-photo-film fa-icon"></i>Galleries</a>
    </div>
  </nav>

  <main>
    <section>
      <h2><i class="fa-solid fa-gamepad fa-icon"></i>Gaming Profiles</h2>
      <ul>
        <li>
          <a href="https://u.gg/lol/profile/na1/jaylapse-jay/overview" target="_blank" rel="noopener noreferrer">
            <i class="fa-solid fa-gamepad fa-icon"></i>League of Legends
          </a>
        </li>

        <li>
          <a href="https://u.gg/val/profile/JayLapse-jay" target="_blank" rel="noopener noreferrer">
            <i class="fa-solid fa-crosshairs fa-icon"></i>Valorant
          </a>
        </li>
        <li>
          <a href="https://www.clashofstats.com/players/jaylapse-GL28QVPY0/summary" target="_blank" rel="noopener noreferrer">
            <i class="fa-solid fa-shield-alt fa-icon"></i>Clash of Clans
          </a>
        </li>
      </ul>
    </section>

    <section>
      <h2><i class="fa-solid fa-user fa-icon"></i>Personal Profiles</h2>
      <ul>
        <li>
          <a href="https://instagram.com/jaylapse" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-instagram fa-icon"></i>Instagram
          </a>
        </li>
        <li>
          <a href="https://facebook.com/lapierre92" target="_blank" rel="noopener noreferrer">
            <i class="fa-brands fa-facebook fa-icon"></i>Facebook
          </a>
        </li>
      </ul>
    </section>
  </main>

  <script>
    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('open');
    }
  </script>
</body>
</html>
